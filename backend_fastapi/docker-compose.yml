version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: forensica
      POSTGRES_PASSWORD: password
      POSTGRES_DB: forensica_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=forensica
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=forensica_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=supersecretkey_change_in_production
      - GEMINI_API_KEY=AIzaSyDs7v-zjPkp5lpK-veOkuOtvFc-yLKnCHI
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=forensica
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=forensica_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=supersecretkey_change_in_production
      - GEMINI_API_KEY=AIzaSyDs7v-zjPkp5lpK-veOkuOtvFc-yLKnCHI
    depends_on:
      - db
      - redis
      - web

volumes:
  postgres_data:
