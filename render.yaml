services:
  # Backend API (FastAPI)
  - name: forensica-api
    type: web
    plan: free
    region: oregon
    buildCommand: cd backend_fastapi && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: POSTGRES_SERVER
        value: <your_postgres_host>
      - key: POSTGRES_PORT
        value: 5432
      - key: POSTGRES_USER
        value: <your_postgres_user>
      - key: POSTGRES_PASSWORD
        value: <your_postgres_password>
      - key: POSTGRES_DB
        value: <your_postgres_db>
      - key: CELERY_BROKER_URL
        value: <your_redis_url>
      - key: CELERY_RESULT_BACKEND
        value: <your_redis_url>
      - key: SECRET_KEY
        value: change_this_to_a_secure_random_string
      - key: GEMINI_API_KEY
        value: your_gemini_api_key_here
    disk:
      mountPath: /app/uploads
      sizeGB: 1

  # Frontend (Static Site)
  - name: forensica-web
    type: static_site
    plan: free
    region: oregon
    buildCommand: npm run build
    startCommand: npx vite preview --host --port 10000
    envVars:
      - key: VITE_API_URL
        value: https://forensica-api.onrender.com
    staticPublishPath: dist
