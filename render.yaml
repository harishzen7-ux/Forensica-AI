services:
  # -----------------------------
  # PostgreSQL Database
  # -----------------------------
  - name: forensica-db
    type: postgres
    plan: free
    region: oregon
    postgresVersion: 15

  # -----------------------------
  # Redis (Celery Broker)
  # -----------------------------
  - name: forensica-redis
    type: redis
    plan: free
    region: oregon

  # -----------------------------
  # Backend API (FastAPI)
  # -----------------------------
  - name: forensica-api
    type: web
    plan: free
    region: oregon
    buildCommand: cd backend_fastapi && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      # Python version
      - key: PYTHON_VERSION
        value: 3.10

      # PostgreSQL
      - key: POSTGRES_SERVER
        fromService:
          name: forensica-db
          type: pserv
          property: host

      - key: POSTGRES_PORT
        fromService:
          name: forensica-db
          type: pserv
          property: port

      - key: POSTGRES_USER
        fromService:
          name: forensica-db
          type: pserv
          property: user

      - key: POSTGRES_PASSWORD
        fromService:
          name: forensica-db
          type: pserv
          property: password

      - key: POSTGRES_DB
        fromService:
          name: forensica-db
          type: pserv
          property: database

      # Redis (Celery)
      - key: CELERY_BROKER_URL
        fromService:
          name: forensica-redis
          type: redis
          property: connectionString

      - key: CELERY_RESULT_BACKEND
        fromService:
          name: forensica-redis
          type: redis
          property: connectionString

      # Secrets (set in dashboard)
      - key: SECRET_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

    disk:
      mountPath: /app/uploads
      sizeGB: 1

  # -----------------------------
  # Celery Worker
  # -----------------------------
  - name: forensica-worker
    type: worker
    plan: free
    region: oregon
    buildCommand: cd backend_fastapi && pip install -r requirements.txt
    startCommand: celery -A app.worker worker --loglevel=info

    envVars:
      - key: PYTHON_VERSION
        value: 3.10

      - key: CELERY_BROKER_URL
        fromService:
          name: forensica-redis
          type: redis
          property: connectionString

      - key: CELERY_RESULT_BACKEND
        fromService:
          name: forensica-redis
          type: redis
          property: connectionString

      - key: SECRET_KEY
        sync: false

      - key: GEMINI_API_KEY
        sync: false

  # -----------------------------
  # Frontend (Static Site)
  # -----------------------------
  - name: forensica-web
    type: web
    runtime: static
    plan: free
    region: oregon

    buildCommand: npm install && npm run build

    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        sync: false   # set after backend deploy
